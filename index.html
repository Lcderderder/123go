<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科目三 C2 灯光操作全表小测试</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
        }

        :root {
            --primary: #165DFF;
            --primary-light: #4080FF;
            --success: #00b42a;
            --danger: #ff4d4f;
            --gray-1: #f7f8fa;
            --gray-2: #e5e6eb;
            --gray-3: #c9cdd4;
            --gray-4: #86909c;
            --gray-5: #4e5969;
            --gray-6: #1d2129;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 16px;
        }

        /* 全局卡片容器 */
        .container {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(22, 93, 255, 0.1);
            width: 100%;
            max-width: 700px;
            min-height: 580px;
            padding: 48px 40px;
            position: relative;
            overflow: hidden;
        }

        /* 页面切换动画 */
        .page {
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: absolute;
            top: 48px;
            left: 40px;
            right: 40px;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .page.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
            position: relative;
            top: 0;
            left: 0;
            right: 0;
        }

        /* 主页样式 */
        #homePage {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 480px;
        }

        h1 {
            color: var(--gray-6);
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 16px;
        }

        .home-desc {
            color: var(--gray-4);
            font-size: 16px;
            margin-bottom: 48px;
            line-height: 1.5;
        }

        /* 按钮通用样式 */
        .btn {
            border: none;
            border-radius: 12px;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(22, 93, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(22, 93, 255, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--gray-1);
            color: var(--gray-5);
            margin-top: 24px;
        }

        .btn-secondary:hover {
            background: var(--gray-2);
        }

        .btn-small {
            padding: 12px 32px;
            font-size: 16px;
        }

        /* 答题页样式 */
        .quiz-header {
            margin-bottom: 32px;
        }

        .progress-wrap {
            width: 100%;
            height: 8px;
            background: var(--gray-2);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            color: var(--gray-4);
            font-size: 14px;
            font-weight: 500;
        }

        .question-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--gray-6);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 40px;
        }

        .option-item {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 2px solid var(--gray-2);
            border-radius: 16px;
            padding: 18px 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .option-item:hover {
            border-color: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(22, 93, 255, 0.08);
        }

        .option-item.selected {
            border-color: var(--primary);
            background: linear-gradient(90deg, #f0f7ff 0%, #e8f3ff 100%);
        }

        .option-label {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--gray-1);
            color: var(--gray-5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            margin-right: 16px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .option-item.selected .option-label {
            background: var(--primary);
            color: #ffffff;
        }

        .option-text {
            font-size: 17px;
            color: var(--gray-6);
            line-height: 1.5;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
        }

        /* 结果页样式 */
        #resultPage {
            text-align: center;
        }

        .result-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--gray-6);
            margin-bottom: 16px;
        }

        .score-display {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 20px 0;
            line-height: 1;
        }

        .score-comment {
            font-size: 18px;
            color: var(--gray-5);
            margin-bottom: 32px;
            font-weight: 500;
        }

        .result-detail {
            text-align: left;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 8px;
            margin-bottom: 32px;
        }

        /* 滚动条美化 */
        .result-detail::-webkit-scrollbar {
            width: 8px;
        }

        .result-detail::-webkit-scrollbar-track {
            background: var(--gray-1);
            border-radius: 4px;
        }

        .result-detail::-webkit-scrollbar-thumb {
            background: var(--gray-3);
            border-radius: 4px;
        }

        .result-detail::-webkit-scrollbar-thumb:hover {
            background: var(--gray-4);
        }

        .result-item {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 14px;
            border-left: 4px solid transparent;
        }

        .result-item.correct {
            background: #f0fff4;
            border-left-color: var(--success);
        }

        .result-item.wrong {
            background: #fff2f0;
            border-left-color: var(--danger);
        }

        .result-question {
            font-weight: 600;
            color: var(--gray-6);
            margin-bottom: 10px;
            font-size: 16px;
            line-height: 1.5;
        }

        .result-answer {
            font-size: 14px;
            line-height: 1.6;
        }

        .result-answer .user-ans {
            margin-bottom: 4px;
        }

        .result-answer .correct-ans {
            font-weight: 600;
        }

        .result-item.correct .user-ans {
            color: var(--success);
        }

        .result-item.wrong .user-ans {
            color: var(--danger);
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .container {
                padding: 32px 24px;
                border-radius: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .question-title {
                font-size: 20px;
            }

            .score-display {
                font-size: 60px;
            }

            .btn {
                padding: 14px 36px;
                font-size: 16px;
            }

            .btn-small {
                padding: 10px 24px;
                font-size: 15px;
            }

            .option-item {
                padding: 16px 18px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 主页 -->
    <div id="homePage" class="page active">
        <h1>🚦 科目三 C2 灯光操作全表小测试</h1>
        <p class="home-desc">共 16 道题 | 题目顺序随机 | 每次测试不重复</p>
        <button class="btn btn-primary" onclick="startQuiz()">开始测试</button>
    </div>

    <!-- 答题页 -->
    <div id="quizPage" class="page">
        <div class="quiz-header">
            <div class="progress-wrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">第 1 / 16 题</div>
        </div>
        <div class="question-title" id="questionText"></div>
        <div class="options-container" id="optionsContainer"></div>
        <div class="nav-buttons">
            <button class="btn btn-primary btn-small" id="prevBtn" onclick="prevQuestion()">上一题</button>
            <button class="btn btn-primary btn-small" id="nextBtn" onclick="nextQuestion()">下一题</button>
        </div>
    </div>

    <!-- 结果页 -->
    <div id="resultPage" class="page">
        <h2 class="result-title">测试完成！</h2>
        <div class="score-display" id="scoreDisplay">0</div>
        <p class="score-comment" id="scoreComment"></p>
        <div class="result-detail" id="resultDetail"></div>
        <button class="btn btn-secondary" onclick="restartQuiz()">再测一次</button>
    </div>
</div>

<script>
    // 完整题库
    const questions = [
        {
            q: "请开启前照灯，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 0
        },
        {
            q: "路口直行，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 0
        },
        {
            q: "会车时，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 0
        },
        {
            q: "在有路灯且照明良好的路口行驶，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 0
        },
        {
            q: "同方向近距离跟车行驶，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 0
        },
        {
            q: "通过有交通信号灯控制的路口，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 0
        },
        {
            q: "在无照明的路段行驶，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 1
        },
        {
            q: "在照明不良的路段行驶，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 1
        },
        {
            q: "超车时，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 2
        },
        {
            q: "通过急弯，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 2
        },
        {
            q: "通过坡道，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 2
        },
        {
            q: "通过拱桥，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 2
        },
        {
            q: "通过人行横道，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 2
        },
        {
            q: "通过没有信号灯的路口，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 2
        },
        {
            q: "路口临时停车，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 3
        },
        {
            q: "车辆发生故障难以移动时，应使用什么灯光？",
            options: ["近光灯", "远光灯", "远近交替", "示廓灯 + 危险报警闪光灯"],
            answer: 3
        }
    ];

    // 全局变量
    let shuffledQuestions = [];
    let currentQuestionIndex = 0;
    let userAnswers = new Array(16).fill(-1); // -1 代表未作答
    const optionLabels = ['A', 'B', 'C', 'D'];

    // Fisher-Yates 洗牌算法 保证随机不重复
    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    // 页面切换函数
    function switchPage(showPageId) {
        document.querySelectorAll('.page').forEach(page => {
            page.classList.remove('active');
        });
        document.getElementById(showPageId).classList.add('active');
    }

    // 开始测试
    function startQuiz() {
        shuffledQuestions = shuffleArray(questions);
        userAnswers = new Array(16).fill(-1);
        currentQuestionIndex = 0;
        switchPage('quizPage');
        showQuestion();
    }

    // 渲染当前题目
    function showQuestion() {
        const currentQuestion = shuffledQuestions[currentQuestionIndex];
        const progress = ((currentQuestionIndex + 1) / 16) * 100;
        
        // 更新进度
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('progressText').innerText = `第 ${currentQuestionIndex + 1} / 16 题`;
        document.getElementById('questionText').innerText = currentQuestion.q;

        // 渲染选项
        const optionsContainer = document.getElementById('optionsContainer');
        optionsContainer.innerHTML = '';
        
        currentQuestion.options.forEach((optionText, index) => {
            const optionDiv = document.createElement('div');
            optionDiv.className = 'option-item';
            if (userAnswers[currentQuestionIndex] === index) {
                optionDiv.classList.add('selected');
            }
            optionDiv.onclick = () => selectOption(index);
            
            optionDiv.innerHTML = `
                <div class="option-label">${optionLabels[index]}</div>
                <div class="option-text">${optionText}</div>
            `;
            optionsContainer.appendChild(optionDiv);
        });

        // 更新按钮状态
        document.getElementById('prevBtn').style.visibility = currentQuestionIndex === 0 ? 'hidden' : 'visible';
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.innerText = currentQuestionIndex === 15 ? '提交试卷' : '下一题';
    }

    // 选中选项
    function selectOption(index) {
        userAnswers[currentQuestionIndex] = index;
        // 更新UI
        const allOptions = document.querySelectorAll('.option-item');
        allOptions.forEach((opt, i) => {
            opt.classList.toggle('selected', i === index);
        });
    }

    // 上一题
    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            showQuestion();
        }
    }

    // 下一题/提交
    function nextQuestion() {
        if (currentQuestionIndex < 15) {
            currentQuestionIndex++;
            showQuestion();
        } else {
            // 提交前检查未作答题目
            const unAnswered = userAnswers.filter(ans => ans === -1).length;
            if (unAnswered > 0) {
                const confirmSubmit = confirm(`你还有 ${unAnswered} 道题未作答，确定要提交试卷吗？`);
                if (!confirmSubmit) return;
            }
            showResult();
        }
    }

    // 渲染结果页
    function showResult() {
        switchPage('resultPage');

        let correctCount = 0;
        const resultDetail = document.getElementById('resultDetail');
        resultDetail.innerHTML = '';

        // 遍历题目计算分数
        shuffledQuestions.forEach((question, index) => {
            const userAns = userAnswers[index];
            const isCorrect = userAns === question.answer;
            if (isCorrect) correctCount++;

            const resultItem = document.createElement('div');
            resultItem.className = isCorrect ? 'result-item correct' : 'result-item wrong';
            
            resultItem.innerHTML = `
                <div class="result-question">
                    ${isCorrect ? '✅' : '❌'} ${index + 1}. ${question.q}
                </div>
                <div class="result-answer">
                    <div class="user-ans">
                        你的答案：${userAns === -1 ? '未作答' : `${optionLabels[userAns]}. ${question.options[userAns]}`}
                    </div>
                    <div class="correct-ans">
                        正确答案：${optionLabels[question.answer]}. ${question.options[question.answer]}
                    </div>
                </div>
            `;
            resultDetail.appendChild(resultItem);
        });

        // 计算分数和评语
        const score = Math.round((correctCount / 16) * 100);
        document.getElementById('scoreDisplay').innerText = `${score}分`;
        
        let comment = '';
        if (score === 100) comment = '满分！灯光考试稳过，科三一把过没问题！';
        else if (score >= 90) comment = '非常优秀，只有小细节需要注意！';
        else if (score >= 70) comment = '掌握得还不错，多刷几遍错题就稳了！';
        else if (score >= 60) comment = '刚好及格，建议再巩固一遍知识点！';
        else comment = '还要多加练习，把灯光规则记牢哦！';
        
        document.getElementById('scoreComment').innerText = comment;
    }

    // 重新测试
    function restartQuiz() {
        switchPage('homePage');
    }
</script>

</body>
</html>
